app = "foodloop-demo-jason"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  OPENROUTER_MODEL = "openai/gpt-4o-mini"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
